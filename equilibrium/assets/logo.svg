<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EQuilibrium">
  <rect width="40" height="40" rx="10" fill="#0d1a2b"/>
  <!-- balance beam (равновесие интересов) -->
  <path d="M8 16 H32" stroke="#22c1c8" stroke-width="2.2" stroke-linecap="round"/>
  <!-- fulcrum / конвейер -->
  <path d="M20 16 L14.5 27 H25.5 Z" fill="none" stroke="#cdd7e3" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M20 16 V11" stroke="#cdd7e3" stroke-width="1.6" stroke-linecap="round"/>
  <!-- node: идея (teal) -->
  <circle cx="9.5" cy="16" r="3.4" fill="#22c1c8"/>
  <!-- node: доля/капитал (gold) -->
  <circle cx="30.5" cy="16" r="3.4" fill="#e2b358"/>
  <!-- node: реализация -->
  <circle cx="20" cy="10" r="2.2" fill="#ffffff"/>
</svg>
