<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNTHESIS — вход в кабинет</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="assets/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230b2a4a'/><circle cx='16' cy='16' r='3.4' fill='%23c9a227'/></svg>">
</head>
<body>
<div class="auth-bg">
  <div class="auth">
    <a class="brand" href="index.html" style="display:flex;align-items:center;gap:10px;letter-spacing:3px;font-size:20px;font-weight:700">
      <svg width="30" height="30" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#0b2a4a"/><path d="M16 5l9 5.2v10.4L16 27l-9-6.4V10.2z" fill="none" stroke="#c9a227" stroke-width="1.4"/><circle cx="16" cy="16" r="3.2" fill="#c9a227"/></svg>
      SUNTHESIS
    </a>
    <p class="muted" style="text-align:center;margin:6px 0 24px;font-size:14px">Кабинет клиента · вход в проект</p>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="you@company.ru" value="client@demo.ru">
    </div>
    <div class="field">
      <label for="pass">Пароль</label>
      <input type="password" id="pass" placeholder="••••••••" value="demo">
    </div>
    <div class="field">
      <label for="role">Войти как</label>
      <select id="role">
        <option value="Клиент">Клиент</option>
        <option value="Дирижёр">Дирижёр (команда SUNTHESIS)</option>
        <option value="Инвестор">Инвестор</option>
      </select>
    </div>
    <button class="btn btn-gold btn-block" onclick="enter()">Войти →</button>
    <div class="note">Демонстрационный режим. Данные хранятся локально в браузере (localStorage), на сервер ничего не отправляется.</div>
    <p style="text-align:center;margin-top:18px;font-size:13px"><a href="index.html" style="color:#1d4e7a">← На главную</a></p>
  </div>
</div>
<script>
function enter(){
  const email=document.getElementById('email').value||'client@demo.ru';
  const role=document.getElementById('role').value;
  localStorage.setItem('snt_user', JSON.stringify({email, role, name: email.split('@')[0]}));
  location.href='cabinet.html';
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')enter();});
</script>
</body>
</html>
